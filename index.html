<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F2EC;
    --cream-dark: #EAE5D8;
    --ink: #1A1A18;
    --ink-mid: #3A3A37;
    --ink-light: #6E6E6A;
    --gold: #B8892E;
    --gold-light: #E8D5A3;
    --gold-bg: #FFFCF4;
    --white: #FFFFFF;
    --border: rgba(26,26,24,0.11);
    --border-strong: rgba(26,26,24,0.2);
  }

  html, body { height:100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    display:flex; flex-direction:column;
    line-height:1.5;
  }

  /* ─── HERO ─────────────────────────────────────────── */
  .hero {
    background: var(--ink);
    color: var(--cream);
    padding: 72px 32px 60px;
    position: relative;
    overflow: hidden;
    text-align:center;
  }
  .hero::before {
    content:''; position:absolute;
    top:-80px; right:-80px;
    width:360px; height:360px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.05);
    pointer-events:none;
  }
  .hero::after {
    content:''; position:absolute;
    bottom:-160px; left:50%; transform:translateX(-50%);
    width:560px; height:560px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.03);
    pointer-events:none;
  }
  .hero-inner { position:relative; z-index:1; max-width:720px; margin:0 auto; }

  h1 {
    font-family:'Playfair Display', serif;
    font-size:clamp(44px, 6vw, 68px);
    font-weight:900;
    line-height:1.05;
    letter-spacing:-0.02em;
    color:var(--cream);
  }

  .hero-welcome {
    font-size:13px;
    font-weight:500;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold);
    margin-top:18px;
  }

  .hero-cta-label {
    font-size:13.5px;
    font-weight:300;
    color:rgba(245,242,236,0.55);
    margin-top:32px;
    letter-spacing:0.04em;
  }

  /* ─── MAIN ─────────────────────────────────────────── */
  .main {
    flex:1;
    max-width:860px;
    width:100%;
    margin:0 auto;
    padding:56px 32px;
  }

  .cards {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }

  .card {
    background:var(--white);
    border:0.5px solid var(--border);
    border-radius:14px;
    padding:36px 28px 28px;
    text-decoration:none;
    color:inherit;
    text-align:center;
    display:flex; flex-direction:column; align-items:center;
    transition:box-shadow 0.25s, border-color 0.25s, transform 0.25s;
  }
  .card:hover {
    border-color:rgba(184,137,46,0.4);
    box-shadow:0 8px 30px rgba(26,26,24,0.08);
    transform:translateY(-2px);
  }

  .card-icon {
    width:64px; height:64px;
    border-radius:14px;
    background:var(--gold-bg);
    border:0.5px solid rgba(184,137,46,0.25);
    display:flex; align-items:center; justify-content:center;
    color:var(--gold);
    margin-bottom:22px;
  }
  .card-icon svg { width:30px; height:30px; }

  .card-title {
    font-family:'Playfair Display', serif;
    font-size:26px;
    font-weight:700;
    color:var(--ink);
    letter-spacing:-0.01em;
    margin-bottom:10px;
  }

  .card-tagline {
    font-size:14px;
    font-weight:400;
    color:var(--ink-mid);
    margin-bottom:18px;
  }

  .card-url {
    font-size:12px;
    font-weight:500;
    letter-spacing:0.05em;
    color:var(--gold);
    padding-top:14px;
    border-top:0.5px solid var(--border);
    width:100%;
    word-break:break-all;
  }

  /* ─── LANG TOGGLE ──────────────────────────────────── */
  .lang-toggle {
    position:fixed; top:18px; right:18px;
    display:flex; align-items:center; gap:4px;
    background:rgba(255,255,255,0.08);
    border:0.5px solid rgba(255,255,255,0.15);
    border-radius:100px;
    padding:3px 5px;
    backdrop-filter:blur(8px);
    z-index:10;
  }
  .lang-btn {
    font-size:11px; font-weight:600;
    letter-spacing:0.08em;
    padding:4px 10px;
    border-radius:100px;
    border:none; background:transparent;
    cursor:pointer;
    color:rgba(245,242,236,0.55);
    font-family:inherit;
    transition:all 0.18s;
  }
  .lang-btn.active { background:var(--gold); color:var(--ink); }

  /* ─── FOOTER ───────────────────────────────────────── */
  footer {
    text-align:center;
    padding:24px;
    font-size:12px;
    color:var(--ink-light);
    border-top:0.5px solid var(--border);
  }
  footer a { color:var(--gold); text-decoration:none; }
  footer a:hover { text-decoration:underline; }

  /* ─── RESPONSIVE ───────────────────────────────────── */
  @media (max-width:680px) {
    .hero { padding:60px 24px 50px; }
    .main { padding:40px 20px; }
    .cards { grid-template-columns:1fr; gap:14px; }
    .card { padding:28px 22px 22px; }
    .lang-toggle { top:12px; right:12px; }
  }
</style>
</head>

<script>
  function setLang(lang) {
    document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-fr]').forEach(el => {
      const val = el.getAttribute('data-' + lang);
      if (val !== null) el.textContent = val;
    });
    try { localStorage.setItem('site-lang', lang); } catch (e) {}
  }

  (function () {
    let saved = 'fr';
    try { saved = localStorage.getItem('site-lang') || 'fr'; } catch (e) {}
    setLang(saved);
  })();
</script>
